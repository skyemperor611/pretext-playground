<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pretext Interactive Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Tab Bar */
  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 16px 24px 0;
    background: #0a0a0a;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 24px;
    border: none;
    background: #1a1a1a;
    color: #666;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab:hover { color: #999; background: #222; }
  .tab.active { color: #fff; background: #161616; }
  .tab.active[data-tab="wave"] { color: #60a5fa; }
  .tab.active[data-tab="shape"] { color: #a78bfa; }
  .tab.active[data-tab="particles"] { color: #f472b6; }
  .tab.active[data-tab="magic"] { color: #fbbf24; }
  .tab.active[data-tab="paint"] { color: #a3e635; }
  .tab.active[data-tab="grid"] { color: #ef4444; }

  /* Main area */
  .main {
    flex: 1;
    background: #161616;
    margin: 0 24px;
    border-radius: 0 8px 0 0;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: #111;
    flex-shrink: 0;
  }
  .controls input[type="text"] {
    flex: 1;
    padding: 8px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .controls input[type="text"]:focus { border-color: #555; }
  .controls input[type="text"] { min-width: 0; }
  .controls label {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
  }

  /* Shape buttons */
  .shape-btns { display: flex; gap: 6px; }
  .shape-btn {
    padding: 6px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shape-btn:hover { border-color: #555; color: #ccc; }
  .shape-btn.active { border-color: #a78bfa; color: #a78bfa; background: #1e1633; }
  .magic-btn {
    padding: 6px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .magic-btn:hover { border-color: #555; color: #ccc; }
  .magic-btn.active { border-color: #fbbf24; color: #fbbf24; background: #2a2010; }
  .paint-btn {
    padding: 6px 14px;
    background: #1a1a1a;
    border: 1px solid #333;
    color: #999;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .paint-btn:hover { border-color: #555; color: #ccc; }
  .paint-btn.active { border-color: #a3e635; color: #a3e635; background: #1a2210; }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333;
    cursor: pointer; transition: transform 0.15s;
  }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.active { border-color: #fff; transform: scale(1.25); }

  /* API badge */
  .api-badge {
    position: absolute;
    top: 12px;
    right: 16px;
    padding: 4px 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 4px;
    font-size: 11px;
    color: #555;
    font-family: monospace;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .tab-bar { padding: 8px 8px 0; }
    .tab { font-size: 11px; padding: 8px 12px; }
    .main { margin: 0 8px; }
    .controls { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
    .controls label { font-size: 11px; }
    .controls input[type="text"] { font-size: 13px; padding: 6px 10px; }
    .api-badge { font-size: 9px; top: 6px; right: 8px; }
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" data-tab="wave">Wave Typography</button>
  <button class="tab" data-tab="shape">Shape Text Fill</button>
  <button class="tab" data-tab="particles">Typo Particles</button>
  <button class="tab" data-tab="magic">Magic Spell</button>
  <button class="tab" data-tab="paint">Painterly Text</button>
  <button class="tab" data-tab="grid">Swiss Grid</button>
</div>

<div class="main">
  <canvas id="canvas"></canvas>
  <div class="api-badge" id="apiBadge">prepareWithSegments + layoutWithLines</div>
</div>

<div class="controls" id="controls-wave">
  <label>TEXT</label>
  <input type="text" id="waveText" value="Pretext는 DOM 없이 텍스트를 측정합니다. Layout magic! 🚀✨ The quick brown fox jumps over the lazy dog.">
</div>

<div class="controls hidden" id="controls-shape">
  <label>SHAPE</label>
  <div class="shape-btns">
    <button class="shape-btn active" data-shape="circle">Circle</button>
    <button class="shape-btn" data-shape="heart">Heart</button>
    <button class="shape-btn" data-shape="triangle">Triangle</button>
  </div>
  <label style="margin-left:auto">SIZE</label>
  <input type="range" id="shapeSize" min="150" max="600" value="400" style="width:160px;accent-color:#a78bfa">
</div>

<div class="controls hidden" id="controls-particles">
  <label>TEXT</label>
  <input type="text" id="particlesText" value="Hello Pretext! 안녕하세요 🎨🌊">
</div>

<div class="controls hidden" id="controls-magic">
  <label>SPELL</label>
  <input type="text" id="magicText" value="Expecto Patronum! 마법의 주문 ✨🪄">
  <label style="margin-left:auto">STYLE</label>
  <div class="shape-btns">
    <button class="magic-btn active" data-spell="spiral">Spiral</button>
    <button class="magic-btn" data-spell="orbit">Orbit</button>
    <button class="magic-btn" data-spell="vortex">Vortex</button>
  </div>
</div>

<div class="controls hidden" id="controls-paint">
  <label>TEXT</label>
  <input type="text" id="paintText" value="봄이 왔다. 풀밭 위에 누워 하늘을 본다. Spring has come, lying on the grass, looking up at the sky.">
  <label style="margin-left:8px">PALETTE</label>
  <div class="color-dot active" data-palette="spring" style="background:linear-gradient(135deg,#a3e635,#65a30d)"></div>
  <div class="color-dot" data-palette="sky" style="background:linear-gradient(135deg,#93c5fd,#bfdbfe)"></div>
  <div class="color-dot" data-palette="blush" style="background:linear-gradient(135deg,#fda4af,#fecdd3)"></div>
  <div class="color-dot" data-palette="mixed" style="background:conic-gradient(#a3e635,#93c5fd,#fda4af,#fde68a,#a3e635)"></div>
  <button class="paint-btn" id="clearPaint" style="margin-left:auto">Clear</button>
</div>

<div class="controls hidden" id="controls-grid">
  <label>TEXT</label>
  <input type="text" id="gridText" value="Typography is the art and technique of arranging type. 타이포그래피는 활자를 배열하는 기술이자 예술입니다.">
  <label>COLS</label>
  <input type="range" id="gridCols" min="3" max="8" value="5" style="width:80px;accent-color:#ef4444">
  <label>ROWS</label>
  <input type="range" id="gridRows" min="3" max="6" value="4" style="width:80px;accent-color:#ef4444">
  <button class="paint-btn" id="shuffleGrid" style="border-color:#ef4444;color:#ef4444">Shuffle</button>
</div>

<script type="importmap">
{
  "imports": {
    "@chenglou/pretext": "https://esm.sh/@chenglou/pretext@0.0.3"
  }
}
</script>

<script type="module">
import { prepareWithSegments, layoutWithLines, layoutNextLine } from '@chenglou/pretext'

// ── State ──
const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')
let currentTab = 'wave'
let mouseX = -1000, mouseY = -1000
let mouseInCanvas = false
let dpr = window.devicePixelRatio || 1
let W, H

// ── Resize ──
function resize() {
  dpr = window.devicePixelRatio || 1
  const rect = canvas.parentElement.getBoundingClientRect()
  W = rect.width
  H = rect.height
  canvas.width = W * dpr
  canvas.height = H * dpr
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
  rebuildCurrentTab()
}
window.addEventListener('resize', resize)

// ── Mouse ──
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect()
  mouseX = e.clientX - rect.left
  mouseY = e.clientY - rect.top
})
canvas.addEventListener('mouseenter', () => { mouseInCanvas = true })
canvas.addEventListener('mouseleave', () => { mouseInCanvas = false; mouseX = -1000; mouseY = -1000 })

// Touch support (global)
canvas.addEventListener('touchstart', e => {
  const touch = e.touches[0]
  const rect = canvas.getBoundingClientRect()
  mouseX = touch.clientX - rect.left
  mouseY = touch.clientY - rect.top
  mouseInCanvas = true
}, { passive: true })
canvas.addEventListener('touchmove', e => {
  e.preventDefault()
  const touch = e.touches[0]
  const rect = canvas.getBoundingClientRect()
  mouseX = touch.clientX - rect.left
  mouseY = touch.clientY - rect.top
}, { passive: false })
canvas.addEventListener('touchend', () => { mouseInCanvas = false; mouseX = -1000; mouseY = -1000 })

// ── Tabs ──
const tabs = document.querySelectorAll('.tab')
const apiBadge = document.getElementById('apiBadge')
const apiTexts = {
  wave: 'prepareWithSegments + layoutWithLines',
  shape: 'prepareWithSegments + layoutNextLine',
  particles: 'prepareWithSegments + layoutWithLines',
  magic: 'prepareWithSegments + layoutWithLines',
  paint: 'prepareWithSegments + layoutNextLine',
  grid: 'prepareWithSegments + layoutNextLine'
}
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    tabs.forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    currentTab = tab.dataset.tab
    document.querySelectorAll('.controls').forEach(c => c.classList.add('hidden'))
    document.getElementById(`controls-${currentTab}`).classList.remove('hidden')
    apiBadge.textContent = apiTexts[currentTab]
    ctx.clearRect(0, 0, W, H)
    rebuildCurrentTab()
  })
})

// ════════════════════════════════════════
//  TAB 1: WAVE TYPOGRAPHY
// ════════════════════════════════════════
let waveChars = []
let waveTime = 0

function buildWave() {
  const text = document.getElementById('waveText').value || 'Hello Pretext!'
  const fontSize = Math.max(20, Math.min(48, W / 20))
  const font = `${fontSize}px Inter`
  const lineHeight = fontSize * 1.5
  const maxWidth = W - 80

  let prepared
  try { prepared = prepareWithSegments(text, font) } catch { return }
  const result = layoutWithLines(prepared, maxWidth, lineHeight)

  waveChars = []
  const startX = 40
  const startY = Math.max(60, (H - result.height) / 2)

  for (let i = 0; i < result.lines.length; i++) {
    const line = result.lines[i]
    const lineText = line.text
    let charX = startX
    const lineY = startY + i * lineHeight

    for (let j = 0; j < lineText.length; j++) {
      const ch = lineText[j]
      ctx.font = font
      const charW = ctx.measureText(ch).width
      waveChars.push({ ch, x: charX + charW / 2, y: lineY, w: charW, fontSize, font })
      charX += charW
    }
  }
}

document.getElementById('waveText').addEventListener('input', () => { if (currentTab === 'wave') buildWave() })

function drawWave() {
  ctx.clearRect(0, 0, W, H)
  waveTime += 0.03

  for (const c of waveChars) {
    const dx = c.x - mouseX
    const dy = c.y - mouseY
    const dist = Math.sqrt(dx * dx + dy * dy)
    const maxDist = 300
    const falloff = Math.max(0, 1 - dist / maxDist)
    const amplitude = falloff * 25
    const offsetY = Math.sin(waveTime + c.x * 0.015) * amplitude
    const hue = (c.x * 0.5 + waveTime * 30) % 360
    const saturation = 40 + falloff * 60
    const lightness = 60 + falloff * 20

    ctx.font = c.font
    ctx.fillStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`
    ctx.textBaseline = 'top'
    ctx.fillText(c.ch, c.x - c.w / 2, c.y + offsetY)
  }

  // Hint text
  if (!mouseInCanvas && waveChars.length > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)'
    ctx.font = '14px Inter'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'bottom'
    ctx.fillText('Move your mouse over the text', W / 2, H - 20)
    ctx.textAlign = 'start'
  }
}

// ════════════════════════════════════════
//  TAB 2: SHAPE TEXT FILL
// ════════════════════════════════════════
let shapeType = 'circle'
let shapeSizeVal = 400

function getShapeWidthAtY(y, size, cx, cy) {
  if (shapeType === 'circle') {
    const r = size / 2
    const dy = y - cy
    if (Math.abs(dy) >= r) return 0
    return 2 * Math.sqrt(r * r - dy * dy)
  }
  if (shapeType === 'triangle') {
    const h = size
    const base = size
    const top = cy - h / 2
    const relY = y - top
    if (relY < 0 || relY > h) return 0
    return (relY / h) * base
  }
  if (shapeType === 'heart') {
    const r = size / 2
    // Heart shape approximation
    const relY = (y - cy) / r // -1 to 1
    if (relY < -0.9 || relY > 1) return 0
    if (relY < 0) {
      // Upper lobes
      const t = -relY // 0 to 0.9
      const w = 2 * r * Math.sqrt(1 - (t - 0.3) * (t - 0.3) / 0.7)
      return Math.max(0, w)
    } else {
      // Lower part (V shape)
      const t = relY // 0 to 1
      const w = 2 * r * (1 - t)
      return Math.max(0, w)
    }
  }
  return 0
}

function drawShapeOutline(cx, cy, size) {
  ctx.strokeStyle = 'rgba(167, 139, 250, 0.2)'
  ctx.lineWidth = 1
  ctx.beginPath()
  if (shapeType === 'circle') {
    ctx.arc(cx, cy, size / 2, 0, Math.PI * 2)
  } else if (shapeType === 'triangle') {
    const h = size, base = size
    ctx.moveTo(cx, cy - h / 2)
    ctx.lineTo(cx + base / 2, cy + h / 2)
    ctx.lineTo(cx - base / 2, cy + h / 2)
    ctx.closePath()
  } else if (shapeType === 'heart') {
    // Draw heart outline using the same width function
    const r = size / 2
    const steps = 100
    let first = true
    for (let i = 0; i <= steps; i++) {
      const y = cy - r * 0.9 + (i / steps) * r * 1.9
      const w = getShapeWidthAtY(y, size, cx, cy)
      if (w > 0) {
        if (first) { ctx.moveTo(cx - w / 2, y); first = false }
        else ctx.lineTo(cx - w / 2, y)
      }
    }
    for (let i = steps; i >= 0; i--) {
      const y = cy - r * 0.9 + (i / steps) * r * 1.9
      const w = getShapeWidthAtY(y, size, cx, cy)
      if (w > 0) ctx.lineTo(cx + w / 2, y)
    }
    ctx.closePath()
  }
  ctx.stroke()
}

let shapeLines = []

function buildShape() {
  const text = "Pretext는 DOM 없이 텍스트 높이를 측정할 수 있습니다. 줄마다 다른 너비를 지정해서 도형 안에 텍스트를 채울 수 있어요! This is the magic of layoutNextLine — each line gets a different max width based on the shape boundary. 🚀✨ The quick brown fox jumps over the lazy dog. Lorem ipsum dolor sit amet, consectetur adipiscing elit. 텍스트가 도형을 따라 흐르는 것을 확인해보세요. Pretty cool, right? Pretext handles multilingual text, emojis, and bidirectional content seamlessly."
  const fontSize = 14
  const font = `${fontSize}px Inter`
  const lineHeight = fontSize * 1.6
  const cx = W / 2
  const cy = H / 2
  const size = shapeSizeVal

  let prepared
  try { prepared = prepareWithSegments(text, font) } catch { return }

  shapeLines = []
  const shapeTop = cy - size / 2
  let y = shapeTop + lineHeight / 2
  let cursor = { segmentIndex: 0, graphemeIndex: 0 }

  while (true) {
    const availW = getShapeWidthAtY(y, size, cx, cy)
    if (availW < 20) { y += lineHeight * 0.3; if (y > cy + size / 2) break; continue }
    const line = layoutNextLine(prepared, cursor, availW - 10)
    if (line === null) break
    const lineX = cx - availW / 2 + 5
    shapeLines.push({ text: line.text, x: lineX, y, width: line.width, availW })
    cursor = line.end
    y += lineHeight
    if (y > cy + size / 2) break
  }
}

document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    shapeType = btn.dataset.shape
    buildShape()
  })
})
document.getElementById('shapeSize').addEventListener('input', e => {
  shapeSizeVal = +e.target.value
  buildShape()
})

function drawShape() {
  ctx.clearRect(0, 0, W, H)
  const cx = W / 2, cy = H / 2

  drawShapeOutline(cx, cy, shapeSizeVal)

  ctx.font = '14px Inter'
  ctx.fillStyle = '#c4b5fd'
  ctx.textBaseline = 'top'
  for (const line of shapeLines) {
    ctx.fillText(line.text, line.x, line.y)
  }

  // Shape label
  ctx.fillStyle = 'rgba(255,255,255,0.1)'
  ctx.font = '12px Inter'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'bottom'
  ctx.fillText(`${shapeType} · ${shapeSizeVal}px`, W / 2, H - 16)
  ctx.textAlign = 'start'
}

// ════════════════════════════════════════
//  TAB 3: TYPO PARTICLES
// ════════════════════════════════════════
let particles = []

function buildParticles() {
  const text = document.getElementById('particlesText').value || 'Hello Pretext!'
  const fontSize = Math.max(24, Math.min(56, W / 16))
  const font = `700 ${fontSize}px Inter`
  const lineHeight = fontSize * 1.4
  const maxWidth = W - 100

  let prepared
  try { prepared = prepareWithSegments(text, font) } catch { return }
  const result = layoutWithLines(prepared, maxWidth, lineHeight)

  const startX = 50
  const startY = Math.max(60, (H - result.height) / 2)

  const oldParticles = particles
  particles = []

  for (let i = 0; i < result.lines.length; i++) {
    const line = result.lines[i]
    const lineText = line.text
    let charX = startX
    const lineY = startY + i * lineHeight

    for (let j = 0; j < lineText.length; j++) {
      const ch = lineText[j]
      ctx.font = font
      const charW = ctx.measureText(ch).width
      const idx = particles.length

      // Reuse old particle positions if available
      const old = oldParticles[idx]
      particles.push({
        ch,
        targetX: charX,
        targetY: lineY,
        currentX: old ? old.currentX : Math.random() * W,
        currentY: old ? old.currentY : Math.random() * H,
        vx: old ? old.vx : 0,
        vy: old ? old.vy : 0,
        w: charW,
        fontSize,
        font,
        scattered: !mouseInCanvas
      })
      charX += charW
    }
  }
}

document.getElementById('particlesText').addEventListener('input', () => {
  if (currentTab === 'particles') buildParticles()
})

function drawParticles() {
  ctx.clearRect(0, 0, W, H)

  const stiffness = 0.08
  const damping = 0.85

  for (const p of particles) {
    let tx, ty
    if (mouseInCanvas) {
      tx = p.targetX
      ty = p.targetY
    } else {
      // Keep scattered positions stable
      if (p.scattered && Math.abs(p.vx) < 0.1 && Math.abs(p.vy) < 0.1) {
        tx = p.currentX
        ty = p.currentY
      } else {
        // Assign a random target when mouse leaves
        if (!p.scatterX) {
          p.scatterX = Math.random() * W
          p.scatterY = Math.random() * H
        }
        tx = p.scatterX
        ty = p.scatterY
      }
    }

    if (mouseInCanvas) {
      p.scatterX = null
      p.scatterY = null
    }

    const ax = (tx - p.currentX) * stiffness
    const ay = (ty - p.currentY) * stiffness
    p.vx = (p.vx + ax) * damping
    p.vy = (p.vy + ay) * damping
    p.currentX += p.vx
    p.currentY += p.vy
    p.scattered = !mouseInCanvas

    // Color based on distance from target
    const dx = p.currentX - p.targetX
    const dy = p.currentY - p.targetY
    const dist = Math.sqrt(dx * dx + dy * dy)
    const maxDist = 400
    const t = Math.min(1, dist / maxDist)
    // Pink when scattered, white when assembled
    const r = Math.round(244 - t * 0)
    const g = Math.round(114 + t * 80)
    const b = Math.round(182 + t * 50)
    const alpha = 0.6 + (1 - t) * 0.4

    ctx.font = p.font
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`
    ctx.textBaseline = 'top'
    ctx.fillText(p.ch, p.currentX, p.currentY)
  }

  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.font = '14px Inter'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'bottom'
  ctx.fillText(mouseInCanvas ? 'Move mouse away to scatter' : 'Hover to assemble the text', W / 2, H - 20)
  ctx.textAlign = 'start'
}

// ════════════════════════════════════════
//  TAB 4: MAGIC SPELL
// ════════════════════════════════════════
let magicChars = []
let magicTime = 0
let spellStyle = 'spiral'
let wandTrail = [] // stores recent mouse positions
let sparkles = [] // floating sparkle particles
let prevMouseX = -1000, prevMouseY = -1000

function buildMagic() {
  const text = document.getElementById('magicText').value || 'Expecto Patronum!'
  const fontSize = Math.max(18, Math.min(36, W / 28))
  const font = `700 ${fontSize}px Inter`
  const lineHeight = fontSize * 1.4
  const maxWidth = W - 100

  let prepared
  try { prepared = prepareWithSegments(text, font) } catch { return }
  const result = layoutWithLines(prepared, maxWidth, lineHeight)

  magicChars = []
  for (let i = 0; i < result.lines.length; i++) {
    const line = result.lines[i]
    for (let j = 0; j < line.text.length; j++) {
      const ch = line.text[j]
      ctx.font = font
      const charW = ctx.measureText(ch).width
      magicChars.push({
        ch, w: charW, fontSize, font,
        // Each char gets its own angle offset in the spiral/orbit
        angleOffset: (magicChars.length / 1.8) * Math.PI,
        radiusOffset: magicChars.length * 12,
        // Current interpolated position for smooth movement
        cx: W / 2, cy: H / 2,
      })
    }
  }
  wandTrail = []
  sparkles = []
}

document.getElementById('magicText').addEventListener('input', () => { if (currentTab === 'magic') buildMagic() })

document.querySelectorAll('.magic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.magic-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    spellStyle = btn.dataset.spell
  })
})

function drawMagic() {
  // Fade effect instead of full clear — leaves ghostly trails
  ctx.fillStyle = 'rgba(10, 10, 10, 0.15)'
  ctx.fillRect(0, 0, W, H)
  magicTime += 0.02

  const wandX = mouseInCanvas ? mouseX : W / 2 + Math.sin(magicTime * 0.7) * 200
  const wandY = mouseInCanvas ? mouseY : H / 2 + Math.cos(magicTime * 0.5) * 120

  // ── Wand trail ──
  wandTrail.push({ x: wandX, y: wandY, t: magicTime })
  if (wandTrail.length > 30) wandTrail.shift()

  // Draw wand trail (golden glowing line)
  if (wandTrail.length > 1) {
    for (let i = 1; i < wandTrail.length; i++) {
      const a = wandTrail[i - 1], b = wandTrail[i]
      const alpha = i / wandTrail.length
      ctx.strokeStyle = `rgba(251, 191, 36, ${alpha * 0.6})`
      ctx.lineWidth = alpha * 3
      ctx.beginPath()
      ctx.moveTo(a.x, a.y)
      ctx.lineTo(b.x, b.y)
      ctx.stroke()
    }
  }

  // ── Spawn sparkles ──
  const speed = Math.sqrt((wandX - prevMouseX) ** 2 + (wandY - prevMouseY) ** 2)
  const spawnCount = Math.min(3, Math.floor(speed / 5))
  for (let i = 0; i < spawnCount; i++) {
    sparkles.push({
      x: wandX + (Math.random() - 0.5) * 20,
      y: wandY + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2 - 0.5,
      life: 1,
      size: Math.random() * 3 + 1,
      hue: 30 + Math.random() * 40 // gold range
    })
  }
  prevMouseX = wandX
  prevMouseY = wandY

  // Update & draw sparkles
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i]
    s.x += s.vx
    s.y += s.vy
    s.vy += 0.02 // gentle gravity
    s.life -= 0.02
    if (s.life <= 0) { sparkles.splice(i, 1); continue }
    ctx.fillStyle = `hsla(${s.hue}, 100%, ${60 + s.life * 30}%, ${s.life})`
    ctx.beginPath()
    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2)
    ctx.fill()
  }

  // ── Draw characters in magical pattern ──
  for (let i = 0; i < magicChars.length; i++) {
    const c = magicChars[i]
    const idx = i
    const total = magicChars.length
    let targetX, targetY, rotation

    if (spellStyle === 'spiral') {
      // Archimedean spiral outward from wand
      const angle = magicTime * 1.5 + idx * 0.55
      const radius = 40 + idx * 14
      targetX = wandX + Math.cos(angle) * radius
      targetY = wandY + Math.sin(angle) * radius
      rotation = angle + Math.PI / 2
    } else if (spellStyle === 'orbit') {
      // Multiple concentric orbits
      const ring = Math.floor(idx / 8)
      const posInRing = idx % 8
      const ringRadius = 60 + ring * 50
      const ringSpeed = 1.2 - ring * 0.15
      const angle = magicTime * ringSpeed + (posInRing / 8) * Math.PI * 2
      targetX = wandX + Math.cos(angle) * ringRadius
      targetY = wandY + Math.sin(angle) * ringRadius
      rotation = angle + Math.PI / 2
    } else { // vortex
      // Sucking vortex — chars spiral inward then shoot outward
      const phase = (magicTime * 0.8 + idx * 0.3) % (Math.PI * 4)
      const t = phase / (Math.PI * 4) // 0→1
      const angle = phase * 2
      let radius
      if (t < 0.7) {
        // Spiral inward
        radius = 300 * (1 - t / 0.7) + 20
      } else {
        // Burst outward
        const burst = (t - 0.7) / 0.3
        radius = 20 + burst * 400
      }
      targetX = wandX + Math.cos(angle) * radius
      targetY = wandY + Math.sin(angle) * radius
      rotation = angle + Math.PI / 2
    }

    // Smooth interpolation
    c.cx += (targetX - c.cx) * 0.12
    c.cy += (targetY - c.cy) * 0.12

    // Distance from wand for color
    const dx = c.cx - wandX
    const dy = c.cy - wandY
    const dist = Math.sqrt(dx * dx + dy * dy)

    // Golden magical gradient: close=bright gold, far=deep amber/purple
    const hue = 35 + dist * 0.15
    const sat = 100 - dist * 0.1
    const light = Math.max(40, 80 - dist * 0.08)
    const alpha = Math.max(0.3, 1 - dist / 500)

    ctx.save()
    ctx.translate(c.cx, c.cy)
    ctx.rotate(rotation)

    // Glow effect
    ctx.shadowColor = `hsla(${hue}, 100%, 70%, ${alpha * 0.8})`
    ctx.shadowBlur = 12 + Math.sin(magicTime * 3 + i) * 4

    ctx.font = c.font
    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`
    ctx.textBaseline = 'middle'
    ctx.textAlign = 'center'
    ctx.fillText(c.ch, 0, 0)

    ctx.restore()
  }

  // Reset shadow
  ctx.shadowColor = 'transparent'
  ctx.shadowBlur = 0

  // Wand dot
  ctx.beginPath()
  ctx.arc(wandX, wandY, 4, 0, Math.PI * 2)
  ctx.fillStyle = `rgba(255, 240, 180, ${0.7 + Math.sin(magicTime * 5) * 0.3})`
  ctx.fill()
  ctx.beginPath()
  ctx.arc(wandX, wandY, 8, 0, Math.PI * 2)
  ctx.fillStyle = `rgba(251, 191, 36, ${0.2 + Math.sin(magicTime * 5) * 0.1})`
  ctx.fill()

  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.12)'
  ctx.font = '14px Inter'
  ctx.textAlign = 'center'
  ctx.textBaseline = 'bottom'
  ctx.fillText(mouseInCanvas ? 'Move your wand' : 'Hover to cast a spell', W / 2, H - 20)
  ctx.textAlign = 'start'
}

// ════════════════════════════════════════
//  TAB 5: PAINTERLY TEXT
// ════════════════════════════════════════
let paintStrokes = [] // each stroke = array of {x, y, ch, size, color, angle, alpha}
let currentStroke = null
let paintCharIndex = 0
let isPainting = false
let paintPaletteName = 'spring'

const palettes = {
  spring: ['#a3e635','#84cc16','#65a30d','#bef264','#d9f99d','#fef08a','#ffffff80'],
  sky:    ['#93c5fd','#bfdbfe','#dbeafe','#60a5fa','#e0f2fe','#f0f9ff','#ffffff80'],
  blush:  ['#fda4af','#fecdd3','#ffe4e6','#fb7185','#fce7f3','#ffffff','#f9a8d4'],
  mixed:  ['#a3e635','#93c5fd','#fda4af','#fde68a','#c084fc','#ffffff80','#86efac'],
}

function getPaintColor() {
  const pal = palettes[paintPaletteName]
  return pal[Math.floor(Math.random() * pal.length)]
}

function getPaintText() {
  return document.getElementById('paintText').value || 'Spring'
}

// Prepare text for painting — we'll pick characters sequentially
let paintPrepared = null
let paintTextContent = ''

function buildPaint() {
  // Draw the canvas background (warm off-white like canvas)
  paintCanvasBg()
  paintStrokes = []
  currentStroke = null
  paintCharIndex = 0
  preparePaintText()
}

function preparePaintText() {
  paintTextContent = getPaintText()
  const font = '24px Inter'
  try { paintPrepared = prepareWithSegments(paintTextContent, font) } catch { paintPrepared = null }
}

function paintCanvasBg() {
  // Warm canvas-like background
  ctx.fillStyle = '#f5f0e8'
  ctx.fillRect(0, 0, W, H)
  // Subtle texture
  for (let i = 0; i < 3000; i++) {
    const x = Math.random() * W
    const y = Math.random() * H
    ctx.fillStyle = `rgba(${180 + Math.random()*40}, ${175 + Math.random()*40}, ${160 + Math.random()*40}, ${Math.random()*0.15})`
    ctx.fillRect(x, y, Math.random() * 3 + 1, Math.random() * 3 + 1)
  }
}

// Paint input handling — shared by mouse and touch
let paintLastX = 0, paintLastY = 0, paintDist = 0

function startPaint(x, y) {
  if (currentTab !== 'paint') return
  isPainting = true
  paintLastX = x; paintLastY = y; paintDist = 0
  currentStroke = []
  paintStrokes.push(currentStroke)
}

function movePaint(x, y) {
  if (currentTab !== 'paint' || !isPainting || !currentStroke) return
  const dx = x - paintLastX, dy = y - paintLastY
  const dist = Math.sqrt(dx * dx + dy * dy)
  const angle = Math.atan2(dy, dx)
  paintDist += dist
  const charSpacing = 12
  if (paintDist >= charSpacing) {
    const steps = Math.floor(paintDist / charSpacing)
    for (let s = 0; s < steps; s++) {
      const t = (s + 1) / steps
      const px = paintLastX + dx * t, py = paintLastY + dy * t
      const ch = paintTextContent[paintCharIndex % paintTextContent.length]
      paintCharIndex++
      const size = Math.min(64, Math.max(14, dist * 1.2 + 8))
      const alpha = Math.max(0.15, Math.min(0.85, 1.2 - dist * 0.015))
      const mark = { x: px, y: py, ch, size, color: getPaintColor(), angle, alpha }
      currentStroke.push(mark)
      drawPaintMark(mark)
    }
    paintDist -= steps * charSpacing
  }
  paintLastX = x; paintLastY = y
}

function endPaint() { isPainting = false; currentStroke = null }

// Mouse handlers
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect()
  startPaint(e.clientX - rect.left, e.clientY - rect.top)
})
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect()
  movePaint(e.clientX - rect.left, e.clientY - rect.top)
})
canvas.addEventListener('mouseup', endPaint)
canvas.addEventListener('mouseleave', () => { if (currentTab === 'paint') endPaint() })

// Touch handlers for paint
canvas.addEventListener('touchstart', e => {
  const touch = e.touches[0], rect = canvas.getBoundingClientRect()
  startPaint(touch.clientX - rect.left, touch.clientY - rect.top)
}, { passive: true })
canvas.addEventListener('touchmove', e => {
  if (currentTab === 'paint' && isPainting) e.preventDefault()
  const touch = e.touches[0], rect = canvas.getBoundingClientRect()
  movePaint(touch.clientX - rect.left, touch.clientY - rect.top)
}, { passive: false })
canvas.addEventListener('touchend', endPaint)

function drawPaintMark(m) {
  ctx.save()
  ctx.globalCompositeOperation = 'multiply'
  ctx.translate(m.x, m.y)
  ctx.rotate(m.angle + (Math.random() - 0.5) * 0.3)
  ctx.font = `${m.size}px Inter`
  ctx.fillStyle = m.color
  ctx.globalAlpha = m.alpha
  ctx.textBaseline = 'middle'
  ctx.textAlign = 'center'
  ctx.fillText(m.ch, 0, 0)

  // Soft halo for painterly blending
  ctx.globalCompositeOperation = 'screen'
  ctx.globalAlpha = m.alpha * 0.2
  ctx.font = `${m.size * 1.5}px Inter`
  ctx.fillText(m.ch, 0, 0)

  ctx.restore()
}

function redrawAllPaint() {
  paintCanvasBg()
  for (const stroke of paintStrokes) {
    for (const m of stroke) drawPaintMark(m)
  }
}

function drawPaint() {
  // Paint tab is not animated frame-by-frame — it's drawn on interaction
  // But we need to show hint when empty
  if (paintStrokes.length === 0 && !isPainting) {
    // Hint
    ctx.fillStyle = 'rgba(0,0,0,0.15)'
    ctx.font = '16px Inter'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('Drag to paint with text', W / 2, H / 2)
    ctx.font = '13px Inter'
    ctx.fillText('글자가 붓터치가 됩니다', W / 2, H / 2 + 28)
    ctx.textAlign = 'start'
  }
}

document.getElementById('paintText').addEventListener('input', preparePaintText)

document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'))
    dot.classList.add('active')
    paintPaletteName = dot.dataset.palette
  })
})

document.getElementById('clearPaint').addEventListener('click', () => {
  paintStrokes = []
  paintCharIndex = 0
  buildPaint()
})

// ════════════════════════════════════════
//  TAB 6: SWISS GRID COMPOSER
// ════════════════════════════════════════
let gridCols = 5, gridRows = 4
let gridCells = []
let gridTextContent = ''
const gridPad = 20 // outer padding

function buildGridCells() {
  gridTextContent = document.getElementById('gridText').value || 'Typography'
  const occupied = Array.from({ length: gridRows }, () => Array(gridCols).fill(false))
  gridCells = []

  for (let r = 0; r < gridRows; r++) {
    for (let c = 0; c < gridCols; c++) {
      if (occupied[r][c]) continue

      // Random span assignment
      let colSpan = 1, rowSpan = 1
      const rand = Math.random()
      if (rand < 0.12 && c + 1 < gridCols && r + 1 < gridRows &&
          !occupied[r][c+1] && !occupied[r+1][c] && !occupied[r+1][c+1]) {
        colSpan = 2; rowSpan = 2
      } else if (rand < 0.25 && c + 1 < gridCols && !occupied[r][c+1]) {
        colSpan = 2
      } else if (rand < 0.35 && r + 1 < gridRows && !occupied[r+1][c]) {
        rowSpan = 2
      }

      // Mark occupied
      for (let dr = 0; dr < rowSpan; dr++)
        for (let dc = 0; dc < colSpan; dc++)
          occupied[r + dr][c + dc] = true

      // Random accent (roughly 10% of cells)
      const isAccent = Math.random() < 0.1

      // Text offset so adjacent cells don't start at same word
      const textOffset = Math.floor(Math.random() * gridTextContent.length)

      gridCells.push({ col: c, row: r, colSpan, rowSpan, isAccent, textOffset })
    }
  }
}

function getGridCellRect(cell) {
  const usableW = W - gridPad * 2
  const usableH = H - gridPad * 2
  const cellW = usableW / gridCols
  const cellH = usableH / gridRows
  return {
    x: gridPad + cell.col * cellW,
    y: gridPad + cell.row * cellH,
    w: cell.colSpan * cellW,
    h: cell.rowSpan * cellH
  }
}

function drawGrid() {
  ctx.clearRect(0, 0, W, H)
  // White background
  ctx.fillStyle = '#ffffff'
  ctx.fillRect(0, 0, W, H)

  const usableW = W - gridPad * 2
  const usableH = H - gridPad * 2

  for (const cell of gridCells) {
    const r = getGridCellRect(cell)
    const pad = 10
    const span = cell.colSpan * cell.rowSpan

    // Background
    if (cell.isAccent) {
      ctx.fillStyle = '#ef4444'
      ctx.fillRect(r.x, r.y, r.w, r.h)
    }

    // Font size based on cell span
    let fontSize
    if (span >= 4) fontSize = Math.min(42, r.w / 8)
    else if (span >= 2) fontSize = Math.min(24, r.w / 10)
    else fontSize = Math.min(14, r.w / 8)
    fontSize = Math.max(10, fontSize)

    const fontWeight = span >= 2 ? '700' : '400'
    const font = `${fontWeight} ${fontSize}px Inter`
    const lineHeight = fontSize * 1.35

    // Text color
    ctx.fillStyle = cell.isAccent ? '#ffffff' : '#111111'
    ctx.font = font
    ctx.textBaseline = 'top'
    ctx.textAlign = 'start'

    // Use pretext to lay out text inside cell
    const maxW = r.w - pad * 2
    if (maxW < 10) continue

    // Build text starting from offset
    const offset = cell.textOffset
    const text = gridTextContent.slice(offset) + ' ' + gridTextContent.slice(0, offset)

    let prepared
    try { prepared = prepareWithSegments(text, font) } catch { continue }

    let cursor = { segmentIndex: 0, graphemeIndex: 0 }
    let y = r.y + pad
    const maxY = r.y + r.h - pad

    while (y + lineHeight <= maxY) {
      const line = layoutNextLine(prepared, cursor, maxW)
      if (line === null) break
      ctx.fillText(line.text, r.x + pad, y)
      cursor = line.end
      y += lineHeight
    }

    // Cell border
    ctx.strokeStyle = '#000000'
    ctx.lineWidth = 1
    ctx.strokeRect(r.x, r.y, r.w, r.h)
  }

  // Outer border (thicker)
  ctx.strokeStyle = '#000000'
  ctx.lineWidth = 2
  ctx.strokeRect(gridPad, gridPad, usableW, usableH)
}

function buildGrid() {
  gridCols = +document.getElementById('gridCols').value
  gridRows = +document.getElementById('gridRows').value
  buildGridCells()
}

// Grid interactions
canvas.addEventListener('click', e => {
  if (currentTab !== 'grid') return
  const rect = canvas.getBoundingClientRect()
  const cx = e.clientX - rect.left
  const cy = e.clientY - rect.top
  // Find clicked cell
  for (const cell of gridCells) {
    const r = getGridCellRect(cell)
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      // Toggle accent on click
      cell.isAccent = !cell.isAccent
      break
    }
  }
})

// Touch tap for grid cells
canvas.addEventListener('touchstart', e => {
  if (currentTab !== 'grid') return
  const touch = e.touches[0]
  const rect = canvas.getBoundingClientRect()
  const cx = touch.clientX - rect.left
  const cy = touch.clientY - rect.top
  for (const cell of gridCells) {
    const r = getGridCellRect(cell)
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      cell.isAccent = !cell.isAccent
      break
    }
  }
}, { passive: true })

document.getElementById('shuffleGrid').addEventListener('click', buildGrid)
document.getElementById('gridCols').addEventListener('input', buildGrid)
document.getElementById('gridRows').addEventListener('input', buildGrid)
document.getElementById('gridText').addEventListener('input', () => {
  gridTextContent = document.getElementById('gridText').value || 'Typography'
})

// ════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════
function rebuildCurrentTab() {
  if (currentTab === 'wave') buildWave()
  else if (currentTab === 'shape') buildShape()
  else if (currentTab === 'particles') buildParticles()
  else if (currentTab === 'magic') buildMagic()
  else if (currentTab === 'paint') buildPaint()
  else if (currentTab === 'grid') buildGrid()
}

function frame() {
  if (currentTab === 'wave') drawWave()
  else if (currentTab === 'shape') drawShape()
  else if (currentTab === 'particles') drawParticles()
  else if (currentTab === 'magic') drawMagic()
  else if (currentTab === 'paint') drawPaint()
  else if (currentTab === 'grid') drawGrid()
  requestAnimationFrame(frame)
}

// Init
resize()
requestAnimationFrame(frame)
</script>
